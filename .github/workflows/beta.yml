name: Build APK and Send Apk

on:
  push:
    branches-ignore:
      - main
      - l10n_dev_crowdin
      - custom-download-location
    paths-ignore:
      - '**/README.md'
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: gradle

    - name: Grant execute permission to gradlew
      run: chmod +x ./gradlew

    - name: Build with Gradle
      run: ./gradlew assembleGoogleAlpha

    - name: Get Commit Information
      id: commits
      run: |
        COMMITS=$(git log -n 10 --pretty=format:"• [`%h`] %s (%an)%n")
        echo "commits<<EOF" >> $GITHUB_OUTPUT
        echo "$COMMITS" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Upload APK to Discord
      run: |
        DISCORD_WEBHOOK=${{ secrets.DISCORD_WEBHOOK }}
        APK_PATH="app/build/outputs/apk/google/alpha/app-google-alpha.apk"
        COMMITS="${{ steps.commits.outputs.commits }}"
        BUILD_TIME=$(date '+%Y-%m-%d %H:%M:%S UTC')
        
        DISCORD_MESSAGE="🌸 **New Build Available!** 🌸

        ⏰ Built at: \`${BUILD_TIME}\`

        📝 **Latest Changes:**
        ${COMMITS}

        💕 *Ara ara~ Your favorite onee-san has a fresh build for you* 💕

        🔗 **My AniList:** https://anilist.co/user/Dawnusedyeet/

        📦 *APK file attached below uwu~*"
        
        curl -H "Content-Type: application/json" -d "{\"content\":\"$DISCORD_MESSAGE\"}" "$DISCORD_WEBHOOK"
        curl -F "file=@$APK_PATH" "$DISCORD_WEBHOOK"

    - name: Upload APK to Telegram
      run: |
        TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHANNEL_ID }}
        APK_PATH="app/build/outputs/apk/google/alpha/app-google-alpha.apk"
        COMMITS="${{ steps.commits.outputs.commits }}"
        BUILD_TIME=$(date '+%Y-%m-%d %H:%M:%S UTC')
        
        TELEGRAM_MESSAGE="🌸 *New Build Available!* 🌸

        ⏰ Built at: \`${BUILD_TIME}\`

        📝 *Latest Changes:*
        ${COMMITS}

        💕 _Ara ara~ Your favorite onee-san has a fresh build for you_ 💕

        🔗 *My AniList:* https://anilist.co/user/Dawnusedyeet/

        📦 _APK file attached below uwu~_"
        
        curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendDocument" -F "chat_id=$TELEGRAM_CHAT_ID" -F "document=@$APK_PATH" -F "caption=$TELEGRAM_MESSAGE" -F "parse_mode=Markdown"

