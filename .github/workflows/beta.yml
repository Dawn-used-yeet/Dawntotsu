name: Build APK and Notify

on:
  push:
    branches-ignore:
      - main
      - l10n_dev_crowdin
      - custom-download-location
    paths-ignore:
      - '**/README.md'
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: gradle

    - name: Build with Gradle
      run: ./gradlew assembleGoogleAlpha

    - name: Get Commit Information
      id: commits
      run: |
        echo "COMMIT_LOG<<EOF" >> $GITHUB_ENV
        git log -n 10 --pretty=format:"%h - %s (%an)" >> $GITHUB_ENV
        echo "EOF" >> $GITHUB_ENV

    - name: Upload APK to Discord
      run: |
        DISCORD_WEBHOOK=${{ secrets.DISCORD_WEBHOOK }}
        APK_PATH="app/build/outputs/apk/google/alpha/app-google-alpha.apk"
        COMMIT_LOG="${{ env.COMMIT_LOG }}"

        curl -H "Content-Type: application/json" \
             -d "{\"content\":\"New build available!\n\nCommits:\n$COMMIT_LOG\"}" \
             $DISCORD_WEBHOOK

        curl -F "file=@$APK_PATH" \
             -F "payload_json={\"content\":\"Here is the APK!\"}" \
             $DISCORD_WEBHOOK

    - name: Upload APK to Telegram
      run: |
        TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHANNEL_ID }}
        APK_PATH="app/build/outputs/apk/google/alpha/app-google-alpha.apk"
        COMMIT_LOG="${{ env.COMMIT_LOG }}"

        curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendDocument" \
             -F "chat_id=$TELEGRAM_CHAT_ID" \
             -F "document=@$APK_PATH" \
             -F "caption=New build available!\n\nCommits:\n$COMMIT_LOG"
