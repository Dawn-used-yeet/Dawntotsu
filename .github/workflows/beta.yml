name: Build APK and Notify

on:
  push:
    branches-ignore:
      - main
      - l10n_dev_crowdin
      - custom-download-location
    paths-ignore:
      - '**/README.md'
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: gradle

    - name: Grant execute permission to gradlew
      run: chmod +x ./gradlew

    - name: Build with Gradle
      run: ./gradlew assembleGoogleAlpha

    - name: Get Commit Information
      id: commits
      run: |
        COMMITS=$(git log -n 10 --pretty=format:"- %h: %s (%an)%n")
        echo "commits<<EOF" >> $GITHUB_OUTPUT
        echo "$COMMITS" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Upload APK to Discord
      run: |
        DISCORD_WEBHOOK=${{ secrets.DISCORD_WEBHOOK }}
        APK_PATH="app/build/outputs/apk/google/alpha/app-google-alpha.apk"
        COMMITS="${{ steps.commits.outputs.commits }}"

        # Define your custom message
        CUSTOM_MESSAGE="I believe in onee-san supramacy"

        COMMITS_ESCAPED=$(echo "$COMMITS" | sed ':a;N;$!ba;s/\n/\\n/g')

        curl -H "Content-Type: application/json" \
             -d "{\"content\":\"$CUSTOM_MESSAGE\\n\\n**Recent commits:**\\n$COMMITS_ESCAPED\"}" \
             $DISCORD_WEBHOOK

        curl -F "file=@$APK_PATH" \
             $DISCORD_WEBHOOK

    - name: Upload APK to Telegram
      run: |
        TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHANNEL_ID }}
        APK_PATH="app/build/outputs/apk/google/alpha/app-google-alpha.apk"
        COMMITS="${{ steps.commits.outputs.commits }}"

        MESSAGE="Virus with trojon and stuff."

        Recent commits:
        $COMMITS"

        curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendDocument" \
             -F "chat_id=$TELEGRAM_CHAT_ID" \
             -F "document=@$APK_PATH" \
             -F "caption=$MESSAGE"
