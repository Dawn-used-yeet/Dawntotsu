name: Build APK and Create Release

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Allows manual triggering of the workflow

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
     
    - name: Make Gradle Wrapper Executable
      run: chmod +x ./gradlew

    - name: Build with Gradle
      run: ./gradlew assembleGoogleAlpha

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: APK
        path: app/build/outputs/apk/google/alpha/app-google-alpha.apk

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: app/build/outputs/apk/google/alpha/app-google-alpha.apk
        tag_name: v${{ github.run_number }}  # Tag based on the run number
        name: Release ${{ github.run_number }}  # Name of the release
        body: |
          New build released!

      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Token for authentication
