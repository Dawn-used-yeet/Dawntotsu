name: Build APK and Send Apk

on:
  push:
    branches-ignore:
      - main
      - l10n_dev_crowdin
      - custom-download-location
    paths-ignore:
      - '**/README.md'
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: gradle

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Grant execute permission to gradlew
      run: chmod +x ./gradlew

    - name: Build with Gradle
      run: ./gradlew assembleGoogleAlpha

    - name: Send to Discord and Telegram
      run: |
        python - <<EOF
        import requests
        import datetime
        import subprocess

        raw_commits = subprocess.check_output(['git', 'log', '-n', '10', '--pretty=format:• %h: %s']).decode()
        commits_list = raw_commits.split('\n')
        discord_commits = '\n> '.join(commits_list)
        telegram_commits = '\n`'.join(commits_list)

        build_time = datetime.datetime.utcnow().strftime('%Y-%m-%d %H:%M:%S UTC')

        discord_message = f"""🌸 **New Build Available!** 🌸

        ⏰ **Built at:** `{build_time}`

        📝 **Latest Changes:**
        > {discord_commits}

        💕 *Ara ara~ Your favorite onee-san has a fresh build for you* 💕

        🔗 **My AniList:** https://anilist.co/user/Dawnusedyeet/

        📦 *APK file attached above uwu~*"""

        telegram_message = f"""🌸 *New Build Available!* 🌸

        ⏰ *Built at:* `{build_time}`

        📝 *Latest Changes:*
        `{telegram_commits}`

        💕 _Ara ara~ Your favorite onee-san has a fresh build for you_ 💕

        🔗 *My AniList:* https://anilist.co/user/Dawnusedyeet/

        📦 _APK file attached above uwu~_"""

        discord_payload = {
            "content": discord_message
        }

        discord_webhook = "${{ secrets.DISCORD_WEBHOOK }}"
        requests.post(discord_webhook, json=discord_payload)
        
        with open('app/build/outputs/apk/google/alpha/app-google-alpha.apk', 'rb') as apk:
            requests.post(discord_webhook, files={'file': apk})

        telegram_url = f"https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument"
        with open('app/build/outputs/apk/google/alpha/app-google-alpha.apk', 'rb') as apk:
            requests.post(
                telegram_url,
                data={
                    'chat_id': '${{ secrets.TELEGRAM_CHANNEL_ID }}',
                    'caption': telegram_message,
                    'parse_mode': 'Markdown'
                },
                files={'document': apk}
            )
        EOF
