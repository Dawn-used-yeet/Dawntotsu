name: Build APK and Send Apk

on:
  push:
    branches-ignore:
      - main
      - l10n_dev_crowdin
      - custom-download-location
    paths-ignore:
      - '**/README.md'
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: gradle

    - name: Grant execute permission to gradlew
      run: chmod +x ./gradlew

    - name: Build with Gradle
      run: ./gradlew assembleGoogleAlpha

    - name: Get Commit Information
      id: commits
      run: |
        COMMITS=$(git log -n 10 --pretty=format:"• [\`%h\`] \"%s\" (%an)%n")
        echo "commits<<EOF" >> $GITHUB_OUTPUT
        echo "$COMMITS" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Upload APK to Discord
      run: |
        BUILD_TIME="$(date '+%Y-%m-%d %H:%M:%S UTC')"
        DISCORD_MESSAGE="🌸 **Ara Ara~** A new build is here! 💕\\n\\n⏰ **Built at:** \`$BUILD_TIME\`\\n\\n📝 **Latest Changes:**\\n> ${COMMITS}\\n\\n📦 *APK file attached above uwu~*"
        curl -H "Content-Type: application/json" -X POST -d "{\"content\":\"$DISCORD_MESSAGE\"}" ${{ secrets.DISCORD_WEBHOOK }}
        curl -F "file=@app/build/outputs/apk/google/alpha/app-google-alpha.apk" ${{ secrets.DISCORD_WEBHOOK }}

    - name: Upload APK to Telegram
      run: |
        TELEGRAM_BOT_TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN }}"
        TELEGRAM_CHAT_ID="${{ secrets.TELEGRAM_CHANNEL_ID }}"
        APK_PATH="app/build/outputs/apk/google/alpha/app-google-alpha.apk"
        COMMITS="${{ steps.commits.outputs.commits }}"
        BUILD_TIME="$(date '+%Y-%m-%d %H:%M:%S UTC')"
        
        TELEGRAM_MESSAGE="🌸 *New Build Available!* 🌸%0A%0A⏰ *Built at:* \`${BUILD_TIME}\`%0A%0A📝 *Latest Changes:*%0A\`${COMMITS}\`%0A%0A💕 _Ara ara~ Your favorite onee-san has a fresh build for you_ 💕%0A%0A🔗 *My AniList:* https://anilist.co/user/Dawnusedyeet/%0A%0A📦 _APK file attached above uwu~_"
        
        curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument" \
          -F "chat_id=${TELEGRAM_CHAT_ID}" \
          -F "document=@${APK_PATH}" \
          -F "caption=${TELEGRAM_MESSAGE}" \
          -F "parse_mode=Markdown"
